<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GrowSafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 text-2xl font-bold text-gray-900">
                <span class="w-3 h-3 rounded-full bg-green-600"></span>
                GrowSafe
            </div>
            <p class="text-gray-600 mt-2">Sign in to your account</p>
        </div>
        
        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="p-3 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-700{% else %}bg-blue-100 text-blue-700{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <div class="bg-white rounded-xl shadow-sm border p-8">
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-2 px-4 rounded-lg hover:bg-slate-800 transition">
                    Sign In
                </button>
            </form>
        </div>
        
        <div class="text-center mt-6 text-sm text-gray-600">
            <p>Demo accounts:</p>
            <p class="mt-1"><strong>Super Admin:</strong> admin@growsafe.com / SuperAdmin@2026</p>
            <p><strong>Company Admin:</strong> admin@bukoola.com / Admin@2026</p>
        </div>
    </div>
</body>
</html>
