{% extends "layouts/dashboard.html" %}
{% block page_title %}Report Issue{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl border p-6">
        <h3 class="text-sm font-semibold mb-4">Report an Issue</h3>
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Issue Type</label>
                <select class="w-full px-3 py-2 border rounded-lg">
                    <option>Suspicious Product</option>
                    <option>Damaged Packaging</option>
                    <option>Wrong Labeling</option>
                    <option>Other</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea rows="4" class="w-full px-3 py-2 border rounded-lg"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-full">Submit Report</button>
        </form>
    </div>
</div>
{% endblock %}
