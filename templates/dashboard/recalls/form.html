{% extends "layouts/dashboard.html" %}
{% block page_title %}Initiate Recall{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <form method="post" class="bg-white rounded-xl border p-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Initiate Recall</button>
    </form>
</div>
{% endblock %}
